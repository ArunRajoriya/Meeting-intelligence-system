version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting-intelligence-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./meeting_notes:/app/meeting_notes
      - ./.env:/app/.env
    restart: unless-stopped
    networks:
      - meeting-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (served via static web server)
  frontend:
    image: node:20-alpine
    container_name: meeting-intelligence-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    networks:
      - meeting-network
    depends_on:
      - backend

networks:
  meeting-network:
    driver: bridge

volumes:
  meeting-data:
